<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0F0F10;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .logo-text {
    font-size: 56px;
    font-weight: 700;
    color: #F1F1F3;
    letter-spacing: -1px;
  }
  .logo-text span { color: #818CF8; }
  .tagline {
    font-size: 28px;
    color: #9CA3AF;
    letter-spacing: -0.3px;
  }
</style>
</head>
<body>
  <div class="logo">
    <svg width="80" height="80" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="28" fill="#6366F1"/>
      <path d="M32,46 C32,46 16,35 16,26 C16,20 19,17 24,17 C27,17 30,19 32,21 C34,19 37,17 40,17 C45,17 48,20 48,26 C48,35 32,46 32,46Z" fill="white"/>
    </svg>
    <div class="logo-text">Ship<span>Proof</span></div>
  </div>
  <div class="tagline">Ship it. Prove it. Show it.</div>
</body>
</html>
