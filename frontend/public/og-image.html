<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0F0F10;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .logo-text {
    font-size: 56px;
    font-weight: 700;
    color: #F1F1F3;
    letter-spacing: -1px;
  }
  .logo-text span { color: #818CF8; }
  .tagline {
    font-size: 28px;
    color: #9CA3AF;
    letter-spacing: -0.3px;
  }
</style>
</head>
<body>
  <div class="logo">
    <svg width="80" height="80" viewBox="0 0 64 64">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6366F1"/>
          <stop offset="100%" stop-color="#8B5CF6"/>
        </linearGradient>
      </defs>
      <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>
      <rect x="15" y="13" width="34" height="25" rx="7" fill="white"/>
      <path d="M24,38 L20,47 L31,38Z" fill="white"/>
      <path d="M23,24 L29,31 L41,18" fill="none" stroke="#6366F1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="logo-text">Ship<span>Proof</span></div>
  </div>
  <div class="tagline">Ship it. Prove it. Show it.</div>
</body>
</html>
