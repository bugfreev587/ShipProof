<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0F0F10;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .logo-text {
    font-size: 56px;
    font-weight: 700;
    color: #F1F1F3;
    letter-spacing: -1px;
  }
  .logo-text span { color: #818CF8; }
  .tagline {
    font-size: 28px;
    color: #9CA3AF;
    letter-spacing: -0.3px;
  }
</style>
</head>
<body>
  <div class="logo">
    <svg width="80" height="80" viewBox="0 0 64 64">
      <rect x="4" y="4" width="56" height="56" rx="14" fill="#6366F1"/>
      <rect x="14" y="11" width="36" height="26" rx="7" fill="white"/>
      <path d="M22,37 L18,48 L30,37Z" fill="white"/>
      <path d="M22,22 L28,30 L42,15" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="logo-text">Ship<span>Proof</span></div>
  </div>
  <div class="tagline">Ship it. Prove it. Show it.</div>
</body>
</html>
